version: 2

sources:
  - name: skystream
    description: "Raw tables written by the SkyStream ingestion pipeline."
    database: skystream
    schema: public
    freshness:
      warn_after: {count: 1, period: minute}
      error_after: {count: 5, period: minute}
    tables:
      - name: flight_states
        description: "Hypertable of per-aircraft state vectors polled from OpenSky Network."
        loaded_at_field: time
        columns:
          - name: time
            description: "Partition timestamp (ingestion time, UTC)."
            tests:
              - not_null
          - name: icao24
            description: "ICAO 24-bit transponder address (hex string, lowercase)."
            tests:
              - not_null
          - name: callsign
            description: "Aircraft callsign, may be null or empty."
          - name: origin_country
            description: "Country inferred from ICAO 24-bit address."
          - name: latitude
            description: "WGS-84 latitude in decimal degrees."
          - name: longitude
            description: "WGS-84 longitude in decimal degrees."
          - name: baro_altitude
            description: "Barometric altitude in metres."
          - name: geo_altitude
            description: "Geometric altitude in metres."
          - name: velocity
            description: "Ground velocity in m/s."
          - name: true_track
            description: "True track angle in degrees (clockwise from north)."
          - name: vertical_rate
            description: "Vertical rate in m/s (positive = climbing)."
          - name: on_ground
            description: "True if the aircraft is on the ground."
          - name: flight_phase
            description: "Derived flight phase label."
            tests:
              - accepted_values:
                  values: ['GROUND', 'CLIMBING', 'DESCENDING', 'CRUISE']
          - name: squawk
            description: "Transponder squawk code."
          - name: ingested_at
            description: "Timestamp when the producer ingested this record."

      - name: flight_events
        description: "Discrete flight events (e.g. takeoff, landing) derived from state changes."
        loaded_at_field: event_time
        columns:
          - name: id
            description: "Surrogate primary key."
            tests:
              - not_null
              - unique
          - name: icao24
            description: "ICAO 24-bit address of the aircraft."
            tests:
              - not_null
          - name: event_type
            description: "Type of flight event."
            tests:
              - not_null
          - name: event_time
            description: "Timestamp when the event occurred."
            tests:
              - not_null
          - name: latitude
            description: "Latitude at event location."
          - name: longitude
            description: "Longitude at event location."

      - name: aircraft_dim
        description: "Aircraft dimension table with registration and operator data."
        columns:
          - name: icao24
            description: "ICAO 24-bit address (primary key)."
            tests:
              - not_null
              - unique
          - name: registration
            description: "Aircraft registration (tail number)."
          - name: model
            description: "Aircraft model / type designation."
          - name: airline
            description: "Operating airline or owner."
          - name: updated_at
            description: "Row last-updated timestamp."

models:
  - name: stg_flight_states
    description: "Cleaned and standardised view of the flight_states hypertable."
    columns:
      - name: time
        tests:
          - not_null
      - name: icao24
        tests:
          - not_null
      - name: flight_phase
        tests:
          - accepted_values:
              values: ['GROUND', 'CLIMBING', 'DESCENDING', 'CRUISE']

  - name: stg_flight_events
    description: "Cleaned view of discrete flight events."
    columns:
      - name: id
        tests:
          - not_null
          - unique
      - name: icao24
        tests:
          - not_null
      - name: event_time
        tests:
          - not_null
